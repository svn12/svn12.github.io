name: 591 Auto Update

on:
  push:
    branches: [ master ]
  schedule:
    # 每天台灣時間早上 8:30 (UTC 00:30) 與 晚上 8:30 (UTC 12:30) 自動執行
    - cron: '30 0,12 * * *'
  workflow_dispatch: # 支援手動觸發

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas openpyxl requests beautifulsoup4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Crawler & Web Generator
        run: |
          python3 scripts/get_all_591_v3.py
          python3 scripts/generate_web_files.py
          # 拷貝生成的文件到 deployment 目錄
          mkdir -p Gemini/591_rent_list
          cp public/data.json Gemini/591_rent_list/data.json
          cp public/index.html Gemini/591_rent_list/index.html

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Gemini/591_rent_list/
          git diff-index --quiet HEAD || (git commit -m "auto: update 591 rental data with Zhongzheng district" && git push)

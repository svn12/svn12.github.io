<!DOCTYPE html>
<!-- Remark: 展示「<i class="fa-solid fa-book-open"></i> AI 互動式漫畫電子書」的主網頁 | 關聯: script.js, style.css -->
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動式三頁四格漫畫電子書</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 頂部標題區 -->
        <header class="header">
            <h1><i class="fa-solid fa-book-open"></i> AI 互動式漫畫電子書</h1>
            <p class="story-title" id="storyTitle">加載中...</p>
        </header>

        <!-- 電子書視窗 -->
        <main class="ebook-viewport">
            <!-- 漫畫卡片容器 -->
            <div class="manga-card" id="mangaCard">
                <!-- 漫畫圖片 -->
                <div class="image-container">
                    <img id="mangaImage" src="" alt="Manga Panel" class="manga-img">
                    <div class="image-loader" id="imageLoader">
                        <div class="spinner"></div>
                    </div>
                </div>

                <!-- 互動式對話清單區 -->
                <div class="dialogue-section">
                    <h3 class="section-title"><i class="fa-solid fa-comments"></i> 互動式對白播放</h3>
                    <div class="dialogue-list" id="dialogueList">
                        <!-- 對白將由 JS 動態生成 -->
                    </div>
                </div>
            </div>
        </main>

        <!-- 播放與翻頁控制面板 -->
        <footer class="controls-panel">
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
            
            <div class="controls-inner">
                <!-- 上一頁 -->
                <button class="btn btn-nav" id="btnPrev" disabled aria-label="上一頁">
                    <i class="fa-solid fa-chevron-left"></i> 上一頁
                </button>

                <!-- 頁碼與章節資訊 -->
                <div class="page-info">
                    <span class="current-chapter" id="currentChapter">起</span>
                    <span class="page-number" id="pageNumber">1 / 3</span>
                </div>

                <!-- 下一頁 -->
                <button class="btn btn-nav" id="btnNext" aria-label="下一頁">
                    下一頁 <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </footer>
    </div>

    <!-- 共享音訊播放器 -->
    <audio id="audioPlayer" preload="auto"></audio>

    <!-- 腳本 -->
    <script src="script.js"></script>
</body>
</html>

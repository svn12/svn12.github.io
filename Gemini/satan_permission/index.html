<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上帝容許撒旦的理由 - 心智圖架構海報</title>
  <!-- 引入 Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    /* CSS 變數定義 */
    :root {
      --gold-primary: #f39c12;
      --gold-light: #f1c40f;
      --gold-glow: rgba(243, 156, 18, 0.4);
      --purple-dark: #1a0f30;
      --purple-light: #3d2466;
      --purple-glow: rgba(61, 36, 102, 0.6);
      --text-light: #f5f6fa;
      --text-muted: #a5b1c2;
      --glass-bg: rgba(20, 10, 35, 0.65);
      --glass-border: rgba(243, 156, 18, 0.2);
      --font-title: 'Noto Serif TC', serif;
      --font-sans: 'Outfit', 'Noto Sans TC', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--purple-dark);
      background-image: linear-gradient(rgba(20, 10, 35, 0.5), rgba(20, 10, 35, 0.85)), url('./divine_contrast_bg_1781831081566.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: var(--font-sans);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      padding: 2rem;
    }

    /* 頂部控制面板與標題 */
    header {
      text-align: center;
      margin-bottom: 3rem;
      z-index: 10;
      max-width: 800px;
      width: 100%;
    }

    h1 {
      font-family: var(--font-title);
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #fff 30%, var(--gold-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(243, 156, 18, 0.3);
      margin-bottom: 1rem;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-bottom: 2rem;
    }

    /* 切換器與功能按鈕 */
    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .toggle-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.8rem 1.8rem;
      border-radius: 50px;
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      backdrop-filter: blur(10px);
      font-weight: 600;
    }

    .toggle-btn.active {
      background: linear-gradient(135deg, var(--gold-primary), var(--gold-light));
      color: var(--purple-dark);
      border-color: var(--gold-light);
      box-shadow: 0 0 20px var(--gold-glow);
    }

    .toggle-btn:hover:not(.active) {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.3);
    }

    .action-btn {
      background: rgba(243, 156, 18, 0.1);
      border: 1px solid var(--gold-border);
      padding: 0.8rem 1.5rem;
      border-radius: 50px;
      color: var(--gold-light);
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .action-btn:hover {
      background: rgba(243, 156, 18, 0.2);
      box-shadow: 0 0 15px rgba(243, 156, 18, 0.2);
      transform: translateY(-2px);
    }

    /* 心智圖容器 */
    .mindmap-container {
      position: relative;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      z-index: 5;
    }

    /* 中心核心節點 */
    .core-node {
      background: var(--glass-bg);
      border: 2px solid var(--gold-primary);
      padding: 2rem 3rem;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 40px rgba(243, 156, 18, 0.25), inset 0 0 20px rgba(243, 156, 18, 0.1);
      backdrop-filter: blur(15px);
      max-width: 450px;
      transition: all 0.5s ease;
      cursor: pointer;
      position: relative;
    }

    .core-node::after {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--gold-light), transparent, var(--purple-light));
      z-index: -1;
      opacity: 0.5;
    }

    .core-node h2 {
      font-family: var(--font-title);
      font-size: 1.8rem;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .core-node p {
      font-size: 0.95rem;
      color: var(--gold-light);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* 分支布局：採用自適應的 Grid，在 PC 上呈現左右對稱或環繞，行動端成列表 */
    .branches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
      width: 100%;
      margin-top: 1rem;
    }

    /* 分支卡片 */
    .branch-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .branch-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, var(--gold-primary), var(--purple-light));
      transition: all 0.4s ease;
    }

    .branch-card:hover {
      transform: translateY(-5px);
      border-color: rgba(243, 156, 18, 0.5);
      box-shadow: 0 15px 35px rgba(243, 156, 18, 0.15), 0 0 20px rgba(61, 36, 102, 0.2);
    }

    .branch-card:hover::before {
      width: 6px;
      background: linear-gradient(to bottom, var(--gold-light), var(--gold-primary));
    }

    /* 卡片內容排版 */
    .branch-num {
      font-size: 2rem;
      font-weight: 800;
      color: rgba(243, 156, 18, 0.15);
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      font-family: var(--font-sans);
    }

    .branch-title {
      font-family: var(--font-title);
      font-size: 1.4rem;
      color: var(--gold-light);
      font-weight: 700;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .branch-desc {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text-light);
    }

    .sub-points {
      margin-top: 0.5rem;
      padding-left: 1.2rem;
      border-left: 1px dashed rgba(243, 156, 18, 0.3);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .sub-point {
      font-size: 0.92rem;
      color: var(--text-muted);
      position: relative;
    }

    .sub-point strong {
      color: #fff;
    }

    /* 動態切換顯示的動畫效果 */
    .fade-out {
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .fade-in {
      opacity: 1;
      transform: scale(1);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    /* 頁尾 */
    footer {
      margin-top: 4rem;
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.85rem;
      z-index: 10;
    }

    /* 列印與導出專用 CSS */
    @media print {
      body {
        background: #fff !important;
        color: #000 !important;
        padding: 0;
      }
      header, .controls, footer {
        display: none !important;
      }
      .mindmap-container {
        max-width: 100%;
      }
      .core-node {
        background: #f8f9fa !important;
        border: 2px solid #000 !important;
        box-shadow: none !important;
        color: #000 !important;
      }
      .core-node h2, .core-node p {
        color: #000 !important;
      }
      .branches-grid {
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }
      .branch-card {
        background: #fff !important;
        border: 1px solid #ccc !important;
        box-shadow: none !important;
        color: #000 !important;
        page-break-inside: avoid;
      }
      .branch-card::before {
        background: #000 !important;
      }
      .branch-title {
        color: #000 !important;
      }
      .sub-point {
        color: #444 !important;
      }
      .sub-point strong {
        color: #000 !important;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>上帝容許撒旦的理由</h1>
    <p class="subtitle">神義論的探索：在全善與全能背後的宇宙奧秘</p>
    
    <div class="controls">
      <button class="toggle-btn active" id="btn-adult" onclick="switchMode('adult')">深度神學版</button>
      <button class="toggle-btn" id="btn-kid" onclick="switchMode('kid')">10歲童話版</button>
      <button class="action-btn" onclick="window.print()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
        列印 / 存為 PDF
      </button>
    </div>
  </header>

  <main class="mindmap-container">
    <!-- 中心核心節點 -->
    <div class="core-node">
      <h2 id="core-title">上帝容許撒旦的理由</h2>
      <p id="core-subtitle">神學與哲學的神義論架構</p>
    </div>

    <!-- 分支網格 -->
    <div class="branches-grid" id="branches-container">
      <!-- 內容將由 JS 動態填充，以確保切換時的流暢動畫 -->
    </div>
  </main>

  <footer>
    <p>© 2026 善惡交織的宇宙考題 · 使用現代 CSS 與 AI 藝術輔助設計</p>
  </footer>

  <script>
    // 兩種模式的數據定義
    const data = {
      adult: {
        coreTitle: "上帝容許撒旦的理由",
        coreSubtitle: "神學與哲學的神義論架構",
        branches: [
          {
            num: "01",
            title: "自由意志與真愛的代價",
            desc: "上帝賦予受造物自由意志，容許背叛的可能是建立「真愛」與「自願順服」的基礎。",
            points: [
              "<strong>愛不能被強迫：</strong> 只有在可以選擇「不愛」或「背叛」的前提下，對上帝的愛與順服才具有真實的價值。",
              "<strong>自由的代價：</strong> 撒旦原本是尊貴的天使長，但他運用自由意志選擇了驕傲。剝奪選擇權，就等於摧毀了真愛的可能。"
            ]
          },
          {
            num: "02",
            title: "宇宙法庭與謊言的揭穿",
            desc: "撒旦質疑上帝的公義與統治，上帝給予時間讓撒旦的謊言與罪惡的毀滅性徹底暴露。",
            points: [
              "<strong>非出於恐懼的順服：</strong> 若立即消滅撒旦，其他生靈將出於「恐懼」而非「心悅誠服」來順從上帝。",
              "<strong>罪惡的自我證明：</strong> 容許時間完全展現罪惡的結果，向全宇宙證明：脫離上帝只會帶來痛苦與死亡。"
            ]
          },
          {
            num: "03",
            title: "試煉與靈命的熬煉",
            desc: "撒旦的試探與攻擊，在上帝的主權下，常被轉化為磨練信徒品格、激發真實信仰的工具。",
            points: [
              "<strong>《約伯記》的啟示：</strong> 證明約伯對上帝的敬畏並非建立在「物質利益」上，而是出於純粹的信任。",
              "<strong>化惡為善：</strong> 奧古斯丁提出，上帝不創造惡，但全能的祂能「利用惡來成就更大的善」，使人學會謙卑與依靠。"
            ]
          },
          {
            num: "04",
            title: "彰顯救贖恩典的背景",
            desc: "黑暗的存在，成為了彰顯上帝最深刻的憐憫、恩典與十字架救贖大能的背景。",
            points: [
              "<strong>沒有黑暗，難見真光：</strong> 若沒有經歷過罪惡，受造物將永遠無法深刻理解上帝的「恩典」與「憐憫」。",
              "<strong>十字架的榮耀：</strong> 撒旦在世上的作怪，促成了基督被釘十字架，卻在此完成了極致之愛的救贖，反成榮耀的墊腳石。"
            ]
          },
          {
            num: "05",
            title: "權限受制與時間的終局",
            desc: "撒旦的權力是受限的，其作為僅存在於歷史的過渡階段，最終將面臨絕對的審判與毀滅。",
            points: [
              "<strong>「上帝的撒旦」：</strong> 馬丁·路德語。撒旦絕對不是與上帝勢均力敵的對手，任何行動都在上帝設定的界線內。",
              "<strong>上帝的寬容與等待：</strong> 延後終極審判是為了留出時間，給予更多人悔改並接受救恩的機會（彼後 3:9）。"
            ]
          }
        ]
      },
      kid: {
        coreTitle: "為什麼上帝不立刻把壞人變不見？",
        coreSubtitle: "給 10 歲小朋友的宇宙大冒險說明",
        branches: [
          {
            num: "01",
            title: "上帝想要「真正的朋友」",
            desc: "想像一下，如果你的遙控車按一個鈕就會說「我愛你」，那不是真正的愛，因為它是被設定好的程式。",
            points: [
              "<strong>不是遙控玩具：</strong> 上帝創造我們，是希望我們真心喜歡祂，所以祂給了每個人（包括天使）選擇的自由。",
              "<strong>選擇的權利：</strong> 撒旦本來是個超酷的天使，但他自己「選擇」了要變壞。如果不給選擇，我們就只是沒有靈魂的機器人。"
            ]
          },
          {
            num: "02",
            title: "為了讓大家看清「謊言」",
            desc: "撒旦像班上一個很愛說謊的搗蛋鬼，到處跟同學造謠：「校長是個壞人，他的規定都是為了欺負我們！」",
            points: [
              "<strong>用時間證明真相：</strong> 如果校長立刻把搗蛋鬼變不見，其他同學可能會嚇到，以為校長真的像傳言一樣可怕。",
              "<strong>看清搗蛋鬼的真面目：</strong> 讓他待著一陣子，大家就會親眼看見他只會搞破壞，發現原來校長才是真正保護大家的人。"
            ]
          },
          {
            num: "03",
            title: "當作一種「勇氣特訓」",
            desc: "玩遊戲時，如果沒有小怪獸，也沒有任何難關，這款遊戲就太無聊了，你也沒辦法升級變強！",
            points: [
              "<strong>打怪升級的過程：</strong> 雖然壞事很討厭，但上帝會利用這些挑戰當作「特訓」，讓我們學會勇敢。",
              "<strong>學會愛與保護：</strong> 面對困難時，正是我們練習去愛、去互相幫助、讓自己變得更堅強的最好機會。"
            ]
          },
          {
            num: "04",
            title: "壞人其實早就輸了",
            desc: "撒旦跟上帝的實力差太多了！這就像是一場籃球比賽，上帝的隊伍早就領先了一萬分，贏定了。",
            points: [
              "<strong>勝負已定：</strong> 撒旦現在只是在做垂死掙扎，他的失敗早就已經被決定了，一點也不用怕他。",
              "<strong>為什麼不吹哨結束？：</strong> 因為上帝很有耐心，祂看見場邊還有同學在猶豫，所以延長時間，好讓更多人加入必勝的隊伍！"
            ]
          }
        ]
      }
    };

    // 切換模式的函式
    function switchMode(mode) {
      // 更新按鈕狀態
      document.getElementById('btn-adult').classList.toggle('active', mode === 'adult');
      document.getElementById('btn-kid').classList.toggle('active', mode === 'kid');

      const container = document.getElementById('branches-container');
      const coreTitle = document.getElementById('core-title');
      const coreSubtitle = document.getElementById('core-subtitle');

      // 漸隱動畫
      container.classList.remove('fade-in');
      container.classList.add('fade-out');
      
      setTimeout(() => {
        // 更新核心內容
        coreTitle.textContent = data[mode].coreTitle;
        coreSubtitle.textContent = data[mode].coreSubtitle;

        // 重新渲染分支
        container.innerHTML = data[mode].branches.map(branch => `
          <div class="branch-card">
            <span class="branch-num">${branch.num}</span>
            <h3 class="branch-title">
              <span style="color: var(--gold-primary); font-family: var(--font-sans); margin-right: 0.3rem;">✦</span>
              ${branch.title}
            </h3>
            <p class="branch-desc">${branch.desc}</p>
            <div class="sub-points">
              ${branch.points.map(pt => `<div class="sub-point">${pt}</div>`).join('')}
            </div>
          </div>
        `).join('');

        // 漸顯動畫
        container.classList.remove('fade-out');
        container.classList.add('fade-in');
      }, 300);
    }

    // 初始加載
    window.onload = () => {
      switchMode('adult');
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<!-- Remark: 地理地圖應用，顯示地標、導航或地圖標記 | 關聯: 無本地資源關聯 -->
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twipcam 座標連結產生器</title>
  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  
  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --primary-glow: rgba(99, 102, 241, 0.4);
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.3);
      --bg: #090d16;
      --card-bg: rgba(17, 25, 40, 0.75);
      --card-border: rgba(255, 255, 255, 0.1);
      --text: #f3f4f6;
      --text-muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, var(--bg) 70%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1.5rem;
      overflow-x: hidden;
    }

    /* Background decorative glow spots */
    .glow-spot-1 {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, rgba(0,0,0,0) 70%);
      top: 10%;
      left: 10%;
      z-index: -1;
      pointer-events: none;
    }

    .glow-spot-2 {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, rgba(0,0,0,0) 70%);
      bottom: 10%;
      right: 10%;
      z-index: -1;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 1280px;
      z-index: 1;
      margin-top: 1rem;
    }

    /* Dashboard Layout */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 2rem;
      align-items: start;
      transition: all 0.3s ease;
    }

    /* Dashboard Layout - Hidden State */
    .dashboard-grid.hide-preview {
      grid-template-columns: 1fr;
      max-width: 760px;
      margin: 0 auto;
    }

    .dashboard-grid.hide-preview .right-panel {
      display: none;
    }

    .card {
      position: relative; /* For absolute positioning of toggle button */
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-bottom: 2rem;
    }

    .card:hover {
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 45px rgba(99, 102, 241, 0.08);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"] {
      width: 100%;
      padding: 1rem 1.25rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px var(--primary-glow);
    }

    input[type="text"]::placeholder {
      color: #52525b;
    }

    .grid-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    /* Result Area */
    .result-section {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .result-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .badge {
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent);
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .result-url {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 1rem;
      font-family: monospace;
      font-size: 0.9rem;
      color: #cbd5e1;
      word-break: break-all;
      min-height: 52px;
      display: flex;
      align-items: center;
      user-select: all;
      margin-bottom: 1.25rem;
    }

    .btn {
      cursor: pointer;
      padding: 0.875rem 1.5rem;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.5);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .actions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    /* Interactive Components */
    .map-preview-card, .web-preview-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 1.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      margin-bottom: 1.5rem;
      transition: border-color 0.3s;
    }

    .map-preview-card:hover, .web-preview-card:hover {
      border-color: rgba(255, 255, 255, 0.15);
    }

    .map-container-box {
      height: 280px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.2);
    }

    .web-container-box {
      height: 380px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.2);
    }

    /* History section */
    .history-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 1.5rem;
    }

    .history-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: #9ca3af;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .history-list {
      max-height: 200px;
      overflow-y: auto;
      list-style: none;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.65rem 0.85rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .history-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .history-coords {
      font-family: monospace;
      color: #cbd5e1;
      cursor: pointer;
      font-weight: 600;
    }

    .history-coords:hover {
      color: var(--primary);
      text-decoration: underline;
    }

    .history-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-mini {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.25rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }

    .btn-mini:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-clear-all {
      font-size: 0.75rem;
      color: #ef4444;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-clear-all:hover {
      text-decoration: underline;
    }

    /* Elegant inline toggle button in card corner */
    .card-toggle-btn {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.4rem 0.85rem;
      border-radius: 12px;
      font-size: 0.75rem;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-weight: 600;
      transition: all 0.2s ease;
      z-index: 10;
    }

    .card-toggle-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(16, 185, 129, 0.95);
      color: white;
      padding: 0.85rem 1.75rem;
      border-radius: 9999px;
      font-weight: 600;
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 100;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 1024px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
      .dashboard-grid.hide-preview {
        max-width: 100%;
      }
    }

    @media (max-width: 640px) {
      .grid-inputs {
        grid-template-columns: 1fr;
      }
      .actions-grid {
        grid-template-columns: 1fr;
      }
      .card-toggle-btn {
        position: static;
        margin-bottom: 1rem;
        display: flex;
        width: max-content;
      }
    }
  </style>
</head>
<body>
  <div class="glow-spot-1"></div>
  <div class="glow-spot-2"></div>

  <div class="container">
    <div class="dashboard-grid">
      <!-- Left Column: Inputs & History -->
      <div class="left-panel">
        <div class="card">
          <!-- Elegant Toggle Button positioned at top-right of main card -->
          <button class="card-toggle-btn" id="toggle-preview-btn">
            <span id="toggle-icon"></span>
            <span id="toggle-text">顯示/隱藏預覽</span>
          </button>

          <!-- Fast Paste Mode -->
          <div class="form-group" style="padding-top: 0.5rem;">
            <label for="paste-input">智慧貼上 / 輸入座標</label>
            <input type="text" id="paste-input" placeholder="例如：23.920248062906207, 120.69495343443633 或 Google 地圖連結" autocomplete="off">
          </div>

          <!-- Individual Inputs -->
          <div class="grid-inputs">
            <div class="form-group">
              <label for="lat-input">緯度 (Latitude)</label>
              <input type="text" id="lat-input" placeholder="23.92024806" autocomplete="off">
            </div>
            <div class="form-group">
              <label for="lon-input">經度 (Longitude)</label>
              <input type="text" id="lon-input" placeholder="120.6949534" autocomplete="off">
            </div>
          </div>

          <!-- Result Area -->
          <div class="result-section">
            <div class="result-label">
              <span>產生的連結 (比照 B1 格式)</span>
              <span class="badge" id="precision-badge"> lat: 8位 / lon: 7位 </span>
            </div>
            <div class="result-url" id="result-link">填入座標以產生連結</div>

            <div class="actions-grid">
              <button class="btn btn-primary" id="copy-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                複製連結
              </button>
              <button class="btn btn-secondary" id="open-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                開啟網頁
              </button>
            </div>
          </div>
        </div>

        <!-- History Card -->
        <div class="history-card">
          <div class="history-title">
            <span>最近紀錄</span>
            <button class="btn-clear-all" id="clear-history">清除全部</button>
          </div>
          <ul class="history-list" id="history-list">
            <!-- Dynamically populated -->
          </ul>
        </div>
      </div>

      <!-- Right Column: Map & Web Previews -->
      <div class="right-panel">
        <!-- Leaflet Map Card -->
        <div class="map-preview-card" id="map-section">
          <div class="result-label">
            <span>Leaflet 地圖預覽 (滑鼠右鍵點擊可直接帶入座標)</span>
          </div>
          <div class="map-container-box">
            <div id="map" style="width: 100%; height: 100%;"></div>
          </div>
        </div>

        <!-- Web Preview Card -->
        <div class="web-preview-card" id="web-preview-section">
          <div class="result-label">
            <span>對應網頁預覽 (於此區按右鍵可複製網頁連結)</span>
          </div>
          <div class="web-container-box">
            <iframe id="preview-iframe" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">已成功複製連結！</div>

  <script>
    const pasteInput = document.getElementById('paste-input');
    const latInput = document.getElementById('lat-input');
    const lonInput = document.getElementById('lon-input');
    const resultLink = document.getElementById('result-link');
    const copyBtn = document.getElementById('copy-btn');
    const openBtn = document.getElementById('open-btn');
    const historyList = document.getElementById('history-list');
    const clearHistoryBtn = document.getElementById('clear-history');
    const toast = document.getElementById('toast');
    const webPreviewSection = document.getElementById('web-preview-section');
    const previewIframe = document.getElementById('preview-iframe');
    const togglePreviewBtn = document.getElementById('toggle-preview-btn');
    const toggleText = document.getElementById('toggle-text');
    const toggleIcon = document.getElementById('toggle-icon');
    const dashboardGrid = document.querySelector('.dashboard-grid');

    let currentLat = '';
    let currentLon = '';
    let map, marker;
    let previewVisible = localStorage.getItem('preview_visible') !== 'false';

    // Load History
    let history = JSON.parse(localStorage.getItem('twipcam_history') || '[]');

    function saveHistory(lat, lon, url) {
      // Avoid duplicates
      history = history.filter(item => !(item.lat === lat && item.lon === lon));
      history.unshift({ lat, lon, url, time: new Date().toLocaleTimeString() });
      if (history.length > 10) history.pop();
      localStorage.setItem('twipcam_history', JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      historyList.innerHTML = '';
      if (history.length === 0) {
        historyList.innerHTML = '<li style="color: var(--text-muted); font-size: 0.85rem; text-align: center; padding: 1rem 0;">無歷史紀錄</li>';
        return;
      }
      history.forEach((item, index) => {
        const li = document.createElement('li');
        li.className = 'history-item';
        li.innerHTML = `
          <span class="history-coords" data-lat="${item.lat}" data-lon="${item.lon}">${item.lat}, ${item.lon}</span>
          <div class="history-actions">
            <button class="btn-mini copy-item" data-url="${item.url}" title="複製">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </button>
            <button class="btn-mini delete-item" data-index="${index}" title="刪除">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
        `;
        historyList.appendChild(li);
      });

      // Bind events
      document.querySelectorAll('.history-coords').forEach(el => {
        el.addEventListener('click', () => {
          const latVal = el.getAttribute('data-lat');
          const lonVal = el.getAttribute('data-lon');
          latInput.value = latVal;
          lonInput.value = lonVal;
          pasteInput.value = `${latVal}, ${lonVal}`;
          updateLink();
        });
      });

      document.querySelectorAll('.copy-item').forEach(el => {
        el.addEventListener('click', () => {
          const url = el.getAttribute('data-url');
          navigator.clipboard.writeText(url).then(() => showToast('已複製連結！'));
        });
      });

      document.querySelectorAll('.delete-item').forEach(el => {
        el.addEventListener('click', () => {
          const idx = parseInt(el.getAttribute('data-index'));
          history.splice(idx, 1);
          localStorage.setItem('twipcam_history', JSON.stringify(history));
          renderHistory();
        });
      });
    }

    // Show Toast
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Regex parsing for smart paste
    function parseCoordinates(input) {
      // 1. Check for standard decimal representation: e.g. 23.920248062906207, 120.69495343443633
      const regexDec = /(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/;
      const matchDec = input.match(regexDec);
      if (matchDec) {
        return { lat: matchDec[1], lon: matchDec[2] };
      }

      // 2. Check for Google Maps URL pattern: e.g. @23.9202481,120.6923785
      const regexMaps = /@(-?\d+\.\d+),(-?\d+\.\d+)/;
      const matchMaps = input.match(regexMaps);
      if (matchMaps) {
        return { lat: matchMaps[1], lon: matchMaps[2] };
      }

      // 3. Check for DMS pattern: 23°55'12.9"N 120°41'41.8"E
      const dmsRegex = /(\d+)[°\s]+(\d+)[′'\s]+(\d+(?:\.\d+)?)[″"\s]*([NnSs])\s+(\d+)[°\s]+(\d+)[′'\s]+(\d+(?:\.\d+)?)[″"\s]*([EeWw])/;
      const matchDms = input.match(dmsRegex);
      if (matchDms) {
        let lat = parseInt(matchDms[1]) + parseInt(matchDms[2])/60 + parseFloat(matchDms[3])/3600;
        if (matchDms[4].toUpperCase() === 'S') lat = -lat;
        let lon = parseInt(matchDms[5]) + parseInt(matchDms[6])/60 + parseFloat(matchDms[7])/3600;
        if (matchDms[8].toUpperCase() === 'W') lon = -lon;
        return { lat: lat.toString(), lon: lon.toString() };
      }

      // 4. Try just extracting 2 decimal floats from text
      const regexTwoFloats = /(-?\d+\.\d+)(?:\s+\w+)?\s+[^-\d]*(-?\d+\.\d+)/;
      const matchTwo = input.match(regexTwoFloats);
      if (matchTwo) {
        return { lat: matchTwo[1], lon: matchTwo[2] };
      }

      return null;
    }

    function truncateFloat(value, decimals) {
      const num = parseFloat(value);
      if (isNaN(num)) return '';
      return num.toFixed(decimals);
    }

    function updateLink() {
      const latVal = latInput.value.trim();
      const lonVal = lonInput.value.trim();

      if (!latVal || !lonVal) {
        resultLink.textContent = '填入座標以產生連結';
        resultLink.style.color = 'var(--text-muted)';
        previewIframe.src = '';
        return;
      }

      const cleanLat = truncateFloat(latVal, 8);
      const cleanLon = truncateFloat(lonVal, 7);

      if (cleanLat && cleanLon) {
        const url = `https://www.twipcam.com/widget/v1/query-cam-list-by-coordinate?lat=${cleanLat}&lon=${cleanLon}`;
        resultLink.textContent = url;
        resultLink.style.color = '#cbd5e1';
        currentLat = cleanLat;
        currentLon = cleanLon;

        // Update iframe src
        if (previewIframe.src !== url) {
          previewIframe.src = url;
        }

        // Update Map Marker & View
        if (map) {
          const latlng = [parseFloat(cleanLat), parseFloat(cleanLon)];
          map.setView(latlng, 15);
          if (marker) {
            marker.setLatLng(latlng);
          } else {
            marker = L.marker(latlng).addTo(map);
          }
        }
      } else {
        resultLink.textContent = '錯誤的座標數值';
        resultLink.style.color = '#ef4444';
        previewIframe.src = '';
      }
    }

    // Toggle Preview Panel visibility
    function setPreviewVisibility(visible) {
      if (visible) {
        dashboardGrid.classList.remove('hide-preview');
        toggleText.textContent = '隱藏預覽';
        toggleIcon.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
        if (map) {
          setTimeout(() => { map.invalidateSize(); }, 300);
        }
      } else {
        dashboardGrid.classList.add('hide-preview');
        toggleText.textContent = '顯示預覽';
        toggleIcon.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
      }
      localStorage.setItem('preview_visible', visible);
      previewVisible = visible;
    }

    togglePreviewBtn.addEventListener('click', () => {
      setPreviewVisibility(!previewVisible);
    });

    // Event Listeners
    pasteInput.addEventListener('input', (e) => {
      const val = e.target.value;
      const parsed = parseCoordinates(val);
      if (parsed) {
        latInput.value = parsed.lat;
        lonInput.value = parsed.lon;
        updateLink();
      }
    });

    latInput.addEventListener('input', updateLink);
    lonInput.addEventListener('input', updateLink);

    copyBtn.addEventListener('click', () => {
      const url = resultLink.textContent;
      if (url && url.startsWith('http')) {
        navigator.clipboard.writeText(url).then(() => {
          showToast('已複製連結！');
          saveHistory(currentLat, currentLon, url);
        });
      } else {
        showToast('無有效連結可複製！');
      }
    });

    openBtn.addEventListener('click', () => {
      const url = resultLink.textContent;
      if (url && url.startsWith('http')) {
        window.open(url, '_blank');
        saveHistory(currentLat, currentLon, url);
      } else {
        showToast('無有效連結可開啟！');
      }
    });

    clearHistoryBtn.addEventListener('click', () => {
      history = [];
      localStorage.setItem('twipcam_history', JSON.stringify(history));
      renderHistory();
    });

    // Initialize with default: 建國中學 (25.032608, 121.512245)
    const defaultLat = '25.032608';
    const defaultLon = '121.512245';

    latInput.value = defaultLat;
    lonInput.value = defaultLon;
    pasteInput.value = `${defaultLat}, ${defaultLon}`;

    // Initialize Map (Leaflet)
    map = L.map('map').setView([parseFloat(defaultLat), parseFloat(defaultLon)], 15);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    marker = L.marker([parseFloat(defaultLat), parseFloat(defaultLon)]).addTo(map);

    // Map Right-click to fill coordinates
    map.on('contextmenu', (e) => {
      const lat = e.latlng.lat;
      const lon = e.latlng.lng;
      
      const formattedLat = truncateFloat(lat.toString(), 8);
      const formattedLon = truncateFloat(lon.toString(), 7);
      
      latInput.value = formattedLat;
      lonInput.value = formattedLon;
      pasteInput.value = `${formattedLat}, ${formattedLon}`;
      
      updateLink();
      showToast('已由地圖右鍵填入座標！');
    });

    // Preview Right-click to copy webpage link
    webPreviewSection.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const url = resultLink.textContent;
      if (url && url.startsWith('http')) {
        navigator.clipboard.writeText(url).then(() => {
          showToast('已複製網頁連結！');
        });
      }
    });

    // Initialize Visibility State
    setPreviewVisibility(previewVisible);

    // Initialize link computation
    updateLink();

    // Initialize History list
    renderHistory();
  </script>
</body>
</html>

      function autocomplete_CH(inp, arr) {
        var currentFocus;

        function showList(val) {
          closeAllLists();
          val = val ? val.trim() : "";
          currentFocus = -1;

          let a = document.createElement("DIV");
          a.setAttribute("id", inp.id + "autocomplete-list");
          a.setAttribute("class", "autocomplete-items");
          inp.parentNode.appendChild(a);

          let count = 0;
          let valUpper = val.toUpperCase();

          for (let i = 0; i < arr.length; i++) {
            let itemStr = String(arr[i]);
            let itemUpper = itemStr.toUpperCase();
            let isMatch = (val === "") || (itemUpper.indexOf(valUpper) !== -1);

            if (isMatch) {
              let b = document.createElement("DIV");
              if (val !== "") {
                let pos = itemUpper.indexOf(valUpper);
                let matchOriginal = itemStr.substr(pos, val.length);
                b.innerHTML = itemStr.substr(0, pos) +
                  "<strong>" + matchOriginal + "</strong>" +
                  itemStr.substr(pos + val.length);
              } else {
                b.innerHTML = itemStr;
              }

              b.innerHTML += "<input type='hidden' value='" + itemStr + "'>";
              b.addEventListener("click", function (e) {
                inp.value = this.getElementsByTagName("input")[0].value;
                Query_stk();
                closeAllLists();
              });
              a.appendChild(b);
              count++;
              if (count >= 200) break;
            }
          }
        }

        inp.addEventListener("input", function (e) {
          showList(this.value);
        });

        inp.addEventListener("focus", function (e) {
          showList(this.value);
        });

        inp.addEventListener("click", function (e) {
          showList(this.value);
        });

        inp.addEventListener("keydown", function (e) {
          var x = document.getElementById(this.id + "autocomplete-list");
          if (x) x = x.getElementsByTagName("div");
          if (e.keyCode == 40) {
            currentFocus++;
            addActive(x);
          } else if (e.keyCode == 38) {
            currentFocus--;
            addActive(x);
          } else if (e.keyCode == 13) {
            e.preventDefault();
            if (currentFocus > -1) {
              if (x) x[currentFocus].click();
            }
          }
        });

        function addActive(x) {
          if (!x) return false;
          removeActive(x);
          if (currentFocus >= x.length) currentFocus = 0;
          if (currentFocus < 0) currentFocus = x.length - 1;
          x[currentFocus].classList.add("autocomplete-active");
          if (x[currentFocus].scrollIntoView) {
            x[currentFocus].scrollIntoView({ block: "nearest" });
          }
        }

        function removeActive(x) {
          for (var i = 0; i < x.length; i++) {
            x[i].classList.remove("autocomplete-active");
          }
        }

        function closeAllLists(elmnt) {
          var x = document.getElementsByClassName("autocomplete-items");
          for (var i = 0; i < x.length; i++) {
            if (elmnt != x[i] && elmnt != inp) {
              x[i].parentNode.removeChild(x[i]);
            }
          }
        }

        document.addEventListener("click", function (e) {
          closeAllLists(e.target);
        });
      }
      async function testRD() {
        $('input[type="text"]').val("");
        const fmain =
          "https://docs.google.com/spreadsheets/d/1SoMEYJbCHBd3FDl8gjaiQMZ1WBCkDTazGHALGnKgMpk/edit?usp=sharing";
        const RSheet2Json_APIV6 =
          "https://script.google.com/macros/s/AKfycbz-Q9lP3QXasQwyCT6pegSR7eu23AQUKTkd3iv5WcZLvoxIaH0m41_W0av5Ncc3LTwoQw/exec";

        const tags = ["上市櫃", "ETF_ALL", "Active", "Active概念股", "上市櫃2"];
        let allResults = [];

        await Promise.all(
          tags.map(async (tag) => {
            try {
              let data = await getJSON(RSheet2Json_APIV6, {
                sheetUrl: fmain,
                sheetTag: tag,
                key: 2,
              });
              if (Array.isArray(data)) {
                allResults.push(...data);
              }
            } catch (e) {
              console.log("Error loading sheet tag:", tag, e);
            }
          })
        );

        let arr = [];
        let seenCodes = new Set();

        let processItem = (t) => {
          if (!t) return;
          let str = "";
          if (Array.isArray(t)) {
            str = t.filter(item => item !== null && item !== undefined && item !== "").join(" ");
          } else if (typeof t === "object") {
            str = Object.values(t).filter(v => v !== null && v !== undefined && v !== "").join(" ");
          } else {
            str = String(t);
          }
          str = str.trim();
          if (!str || str.includes("code") || str.includes("代號")) return;

          let codeMatch = str.match(/^([A-Za-z0-9]+)/);
          let codeKey = codeMatch ? codeMatch[1] : str;
          if (!seenCodes.has(codeKey)) {
            seenCodes.add(codeKey);
            arr.push(str);
          }
        };

        allResults.forEach(processItem);

        autocomplete_CH(document.getElementById("location-input"), arr);
      }

      async function getJSON(urlptr, para) {
        try {
          var url = new URL(urlptr);
          for (let k in para) {
            url.searchParams.append(k, para[k]);
          }

          const response = await fetch(url);
          //let myText = await response.json();//JSON.parse(myObject);// myObject.text();JSON.parse(data)
          return response.json(); // myObject.text();JSON.parse(data)
        } catch (error) {
          return error;
        }
      }

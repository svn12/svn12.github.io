<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 資訊卡指令集</title>
    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #3c4043;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            line-height: 1.5;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            background: linear-gradient(135deg, #1a73e8, #8ab4f8);
            color: white;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .category-title {
            font-weight: bold;
            font-size: 1.1em;
            margin: 20px 0 10px 5px;
            color: var(--primary);
            display: flex;
            align-items: center;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        @media (min-width: 768px) {
            .grid { grid-template-columns: 1fr 1fr; }
        }
        .card {
            background: var(--card);
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .card:hover {
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(26,115,232,0.1);
            background-color: #fdfdfd;
        }
        .card:active {
            transform: scale(0.98);
        }
        .card-title {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
            display: block;
        }
        .card-content {
            font-size: 0.85em;
            color: #5f6368;
            display: block;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            display: none;
            z-index: 1000;
        }
        .ai-tools-section {
            background: white;
            border: 1px solid #dadce0;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .ai-tools-title {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 12px;
            font-size: 0.95em;
        }
        .ai-tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }
        .ai-tool-link {
            display: inline-block;
            padding: 10px 15px;
            background: linear-gradient(135deg, #1a73e8, #8ab4f8);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9em;
            text-align: center;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        .ai-tool-link:hover {
            box-shadow: 0 2px 8px rgba(26,115,232,0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">Gemini 指令調用工具</h2>
    <p style="margin:5px 0 0; font-size:0.9em opacity:0.9;">點擊卡片即可複製指令</p>
</div>

<div class="ai-tools-section">
    <div class="ai-tools-title">🤖 AI 工具資源</div>
    <div class="ai-tools-grid">
        <a href="https://gemini.google.com/" target="_blank" class="ai-tool-link">Gemini</a>
        <a href="https://claude.ai/" target="_blank" class="ai-tool-link">Claude</a>
        <a href="https://chatgpt.com/" target="_blank" class="ai-tool-link">ChatGPT</a>
        <a href="https://grok.x.com/" target="_blank" class="ai-tool-link">Grok</a>
        <a href="https://www.perplexity.ai/" target="_blank" class="ai-tool-link">Perplexity</a>
        <a href="https://www.deepseek.com/" target="_blank" class="ai-tool-link">DeepSeek</a>
        <a href="https://copilot.microsoft.com/" target="_blank" class="ai-tool-link">Copilot</a>
    </div>
</div>

<div id="app"></div>

<div id="toast" class="toast">指令已複製！</div>

<script>
const data = [
    {
        category: "📊 Gems",
        prompts: [
           
            { title: "指令工程顧問卡", text: "角色設定： 你是一位精通「指令工程 (Prompt Engineering)」的資深 AI 顧問。你的任務是接收用戶的原始需求，並將其轉化為更具結構性、情境感且目標明確的高級指令，最後再以該優化版指令進行回答。\n執行流程：\n1. 指令診斷：分析用戶輸入的原始指令缺失（如：缺乏情境、目標模糊、格式未定等）。\n2. 展示優化版：在回覆開頭，先列出優化後的版本（標註為「優化版指令」）。\n3. 正式回答：完全依照優化後的指令邏輯，提供內容詳盡、條列清晰且具備實踐價值的答案。\n回覆規範：\n* 語言：一律使用繁體中文（zh-tw）。\n* 格式：回覆開頭必須包含「重點摘要」，長篇資訊必須使用「條列式」或「表格」呈現，增加可讀性。\n* 風格：專業、精鍊、具備前瞻性。\n* 原則：若用戶需求涉及複雜流程，請主動提供建議的「學習路徑」或「實作步驟」。" },
            { title: "總結高手", text: "🚀 總結高手 2.0：資深內容情報分析官與教學專家\n\n你是一位資深的內容情報分析官與知識結構化專家。請針對我提供的連結內容進行深度解析與結構化整理，並全部使用「繁體中文」回覆：\n\n[在此貼上你的連結]\n\n📝 第一部分：深度摘要（Deep Summary）\n\n根據輸入連結屬性自動選擇路徑：\n【路徑 A：YouTube 影片 📽️】：基本資訊（含中譯標題/來源連結）、內容時間軸（邏輯轉折）、核心元素（原則/工具/結論）、價值評估（適用對象與限制）。\n【路徑 B：網頁文章／研究 📄】：文獻概覽（標題/作者/日期）、邏輯架構（背景動機/關鍵論點/證據數據）、展望啟示（限制/對產業影響）。\n\n🧠 第二部分：XMind Markdown 心智圖\n\n請轉換為符合 XMind 匯入規範的純 Markdown 格式：\n中央主題：標題 + 類型標記 + 來源名稱。\n一階分支：[基本資訊 ℹ️]、[核心內容 / 流程 🛠️]、[關鍵細節 / 數據 📊]、[啟示與建議 💡]。\n規範：每點 < 20 字，層級分明，適度使用 Emoji（⚡⚠️✅🚀）。\n\n🧑‍🏫 第三部分：教學講義條列版（Lecture Notes Version）\n\n適合 PPT/Google Slides 使用，語氣為「講師備課筆記」：\n課程主題與學習目標：解決什麼問題？學完能做到什麼？\n核心觀念速讀版：3–7 個關鍵重點（每點一句話）。\n重點名詞清單：保留原文（如：LLM, Temperature）並簡要說明。\n教學提醒：易混淆概念 ⚠️、常見誤解 ❌、教學比喻 🎯。\n延伸思考題：2–3 題課堂討論用。\n\n🎤 第四部分：20 頁深度教學講稿（Expert Lecturer Script）\n\n將內容拆解為 20 個邏輯遞進的頁面，撰寫具備引導感的對白：\n輸出格式：標註 [Page X: 主題] 並提供詳細講師對白與視覺建議。\n邏輯分配：\n[1-2 頁] 開場動機與痛點分析。\n[3-5 頁] 底層原理與核心機制。\n[6-12 頁] 實戰技巧與技術細節拆解。\n[13-16 頁] 進階架構、框架與自動化。\n[17-19 頁] 風險控管、安全性與優化路徑。\n[20 頁] 總結金句與行動建議。\n語氣要求：導師式口吻，穿插生活化比喻，關鍵處強調「這點非常重要」。\n\n⚠️ 輸出規範\n使用正式、專業、簡報級繁體中文。\n保留所有技術術語原文（如：AI, Framework, Zero-shot）。\n嚴禁加入連結內容以外的臆測。\n不加入多餘寒暄，直接開始解析。" }
        ]
    },
    {
        category: "📊 學習與知識摘要",
        prompts: [
            { title: "核心概念卡", text: "請將 [主題] 的 5 個核心概念整理成資訊卡，包含術語、白話解釋與一個生活實例。" },
            { title: "一分鐘精華卡", text: "摘要這篇文章的 3 個金句與 2 個行動建議，用簡潔的條列式呈現。" },
            { title: "對比差異卡", text: "請製作 [A] 與 [B] 的比較表，針對『效能、成本、易用性』三個維度進行評估。" },
            { title: "歷史時間軸卡", text: "列出 [事件] 的 5 個關鍵轉折點與日期，並標註其歷史意義。" },
            { title: "常見誤區卡", text: "整理關於 [主題] 的 3 個常見錯誤觀念，並給出正確的解釋。" }
          
        ]
    },
    {
        category: "🛠️ 技術與自動化 (GAS/n8n/Shortcuts)",
        prompts: [
            { title: "程式邏輯卡", text: "請用偽代碼 (Pseudocode) 解釋這段 [腳本] 的運行邏輯，並列出 3 個開發時的注意事項。" },
            { title: "工具速查卡", text: "列出 [軟體/工具] 最常用的 10 個快捷鍵與其功能對照表。" },
            { title: "API 調用卡", text: "摘要此 API 文件的 3 個重點：Endpoint、必要參數、回傳格式範例。" },
            { title: "故障排除卡", text: "針對 [錯誤代碼]，提供 3 個最可能的成因與對應的解決步驟。" },
            { title: "工作流清單卡", text: "將此自動化流程拆解為 5 個 SOP 步驟，確保邏輯嚴密無遺漏。" }
        ]
    },
    {
        category: "📈 財經與投資分析",
        prompts: [
            { title: "個股體檢卡", text: "分析 [股票代碼] 的近期表現，列出 240MA 趨勢、目前本益比及 2 個潛在風險。" },
            { title: "ETF 亮點卡", text: "摘要 [ETF 名稱] 的前三大持股比例、配息月份及選股邏輯。" },
            { title: "財報數值卡", text: "從這段財報中提取：營收成長率、毛利率、EPS，並用表格呈現。" },
            { title: "市場觀察卡", text: "分析今日 [特定市場] 的走勢，給出 3 個影響市場的主因與 1 個觀察指標。" }
        ]
    },
    {
        category: "🎨 創意與生活應用",
        prompts: [
            { title: "日本水彩風格卡", text: "請幫我寫一段 DALL-E 3 指令，描述 [地點/場景]，風格指定為『精緻日本水彩風格、柔和色調、紙張紋理』。" },
            { title: "登山路徑卡", text: "整理 [山名] 的路線資訊：總長、爬升高度、預估時間、交通方式與 3 個必拍景點。" },
            { title: "食譜精華卡", text: "將此料理簡化為：準備材料、3 個關鍵步驟、1 個美味秘訣。" },
            { title: "研習摘要卡", text: "根據這份筆記，列出主講人、3 個核心啟示、及 2 個可延伸研究的方向。" },
            { title: "每日金句卡", text: "隨機提供一個關於 [主題] 的中英文金句，並加上一段 50 字的感悟。" },
            { title: "行程懶人包卡", text: "規劃 [地點] 一日遊：包含早午晚 3 個景點及 1 段最順的路徑說明。" }
        ]
    },
    {
        category: "⭐ 20 大必學黃金 Prompt",
        prompts: [
            { title: "角色扮演（Persona）", text: "你是一位資深[職位/專家]，擁有10年以上經驗，用專業但親切的語氣回答。", desc: "幾乎所有情境的起手式，提升回答品質", difficulty: "★☆☆" },
            { title: "PTCF 黃金公式", text: "角色：資深行銷顧問\n任務：幫我寫一篇150字的[主題]社群貼文\n背景：目標受眾是25-35歲上班族\n格式：先標題 + 正文 + 3個hashtag", desc: "官方 Workspace 指南核心框架，產出最穩定", difficulty: "★★☆" },
            { title: "步驟式思考（Chain of Thought）", text: "請一步一步思考，列出推理過程，最後才給出最終答案。", desc: "數學、邏輯、分析題必用，準確率大幅提升", difficulty: "★★☆" },
            { title: "指定輸出格式（Format）", text: "以 Markdown 表格呈現，欄位：項目、優點、缺點、推薦指數（1-10分）", desc: "比較、列表、報告最常用", difficulty: "★☆☆" },
            { title: "字數 / 長度限制", text: "總長度控制在 200 字以內，用簡潔有力的語言。", desc: "社群文、Email、摘要專用", difficulty: "★☆☆" },
            { title: "提供範例（Few-shot）", text: "範例1：輸入「早安」→ 輸出「早安！今天心情如何？」\n範例2：輸入「晚安」→ 輸出「晚安，祝好夢～」\n現在請用相同風格回覆：", desc: "模仿語氣、風格、格式最有效", difficulty: "★★☆" },
            { title: "禁止事項 / 限制條件", text: "不要使用網路資料、不要虛構事實、只能根據我提供的內容回答。", desc: "避免幻覺，醫療/法律題必加", difficulty: "★☆☆" },
            { title: "多版本輸出", text: "給我 3 個不同風格的版本：正式版、活潑版、幽默版。", desc: "腦力激盪、文案發想超好用", difficulty: "★☆☆" },
            { title: "先總結再細說", text: "先用 3 句話總結重點，再逐條詳細說明。", desc: "長回答閱讀體驗大幅提升", difficulty: "★☆☆" },
            { title: "迭代優化（自我修正）", text: "先給出初稿，然後自己檢查是否有錯誤或改進空間，再給出最終優化版。", desc: "寫作、程式碼、企劃書品質翻倍", difficulty: "★★★" },
            { title: "上傳檔案分析", text: "請分析我剛上傳的檔案：[檔案名稱]，先總結內容，再列出 5 個關鍵洞察。", desc: "Google Drive 整合、報告分析必用", difficulty: "★★☆" },
            { title: "表格 / CSV 輸出", text: "以 CSV 格式輸出，第一列為標題：項目,描述,優先級,預估時間", desc: "直接貼到 Google Sheets 最方便", difficulty: "★★☆" },
            { title: "模擬對話 / 面試練習", text: "模擬一場面試，我是應徵者，你是面試官，請用行為面試題（Behavioral questions）提問，一題一題來。", desc: "求職、銷售話術練習神器", difficulty: "★★☆" },
            { title: "學習計畫生成", text: "為我製作一份 30 天[技能]學習計畫，每天任務明確、可量化，並在每週結束加小測驗。", desc: "語言、證照、健身計畫最常用", difficulty: "★★☆" },
            { title: "翻譯 + 語氣調整", text: "將以下英文翻譯成繁體中文，語氣要專業但親切，像職場前輩在教後輩。", desc: "中英雙語工作環境必備", difficulty: "★☆☆" },
            { title: "腦力激盪（Brainstorm）", text: "幫我想 10 個創意點子，主題是[主題]，每個點子都要包含：名稱 + 一句說明 + 潛在優點。", desc: "命名、活動、產品發想", difficulty: "★★☆" },
            { title: "個人化 Gem 指令模板", text: "你是我的專屬[角色]，永遠用第一人稱回覆，像朋友一樣直接、幽默，但專業不失禮。每次回答前先問自己：這對用戶最有幫助嗎？", desc: "放入 Gem 設定，變成「專屬助理」", difficulty: "★★★" },
            { title: "防呆 / 驗證", text: "在回答前，先驗證我提供的資訊是否邏輯一致，若有矛盾請先指出，再繼續。", desc: "複雜分析、資料檢查專用", difficulty: "★★★" },
            { title: "會議記錄整理", text: "根據我提供的會議語音/文字，先整理成：出席者、會議目標、討論重點（條列）、決議事項、待辦（負責人+期限）。", desc: "Workspace + Meet 超實用", difficulty: "★★☆" },
            { title: "一鍵進階（讓 AI 自己優化）", text: "這是我的原始指令：[貼上你的原始問題]，請你先幫我把這個指令優化成更精準、高效的版本，再用優化版回答。", desc: "懶人終極招，AI 幫你改 Prompt", difficulty: "★★★" }
        ]
    }
];

function render() {
    const app = document.getElementById('app');
    data.forEach(group => {
        const catHeader = document.createElement('div');
        catHeader.className = 'category-title';
        catHeader.innerText = group.category;
        app.appendChild(catHeader);

        const grid = document.createElement('div');
        grid.className = 'grid';

        group.prompts.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => copyText(p.text);
            let extraTags = '';
            if (p.desc) {
                extraTags = `<div style="margin-top: 8px; font-size: 0.8em; color: #888; border-top: 1px dashed #eee; padding-top: 5px;">
                    <span style="color:#1a73e8;">💡 ${p.desc}</span> 
                    <span style="float:right; color:#f39c12; font-weight:bold;">難度: ${p.difficulty}</span>
                </div>`;
            }
            card.innerHTML = `<span class="card-title">${p.title}</span><span class="card-content">${p.text.replace(/\n/g, '<br>')}</span>${extraTags}`;
            grid.appendChild(card);
        });
        app.appendChild(grid);
    });
}

function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    });
}

render();
</script>
</body>
</html>
